<html lang="es">

<meta charset="UTF-8">

<title>Siete Lunas · Revenue Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080A;--cd:#111114;--cd2:#18181C;--g:#C8A45E;--gl:#E8C66A;--tx:#E8E4DC;--sb:#7A7670;--bd:rgba(200,164,94,0.12);--red:#E85D3A;--grn:#10B981;--blue:#5B9BD5}
body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:var(--g);color:#000}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

.header{background:linear-gradient(180deg,#0E0E12,var(--bg));border-bottom:1px solid var(--bd);padding:11px 20px;position:sticky;top:0;z-index:50;backdrop-filter:blur(16px)}
.header-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.logo-circle{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--gl));display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--g);letter-spacing:2px}
.logo-sub{font-size:8px;color:var(--sb);letter-spacing:3px;text-transform:uppercase}
.header-controls{display:flex;gap:5px;align-items:center}
.search-wrap{position:relative}
.search-input{background:var(--cd);border:1px solid var(--bd);color:var(--tx);padding:5px 8px 5px 24px;border-radius:7px;font-size:10px;font-family:inherit;width:130px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--g)}
.search-icon{position:absolute;left:7px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--sb)}
.search-results{position:absolute;top:100%;left:0;right:0;background:#1a1a1e;border:1px solid var(--bd);border-radius:7px;margin-top:3px;max-height:200px;overflow-y:auto;z-index:99;display:none}
.search-results.show{display:block}
.search-item{padding:5px 8px;border-bottom:1px solid var(--bd);cursor:pointer;font-size:10px;transition:background .15s}
.search-item:hover{background:rgba(200,164,94,.08)}
.search-item-name{font-weight:500}
.search-item-meta{color:var(--sb);font-size:8px}
.villa-select{background:var(--cd);border:1px solid var(--bd);color:var(--g);padding:5px 6px;border-radius:7px;font-size:10px;font-family:inherit;cursor:pointer}

.wrap{max-width:1300px;margin:0 auto;padding:10px 20px}
.tabs{display:flex;gap:2px;margin-bottom:12px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:1px solid transparent;color:var(--sb);padding:5px 11px;border-radius:7px;font-size:10px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
.tab.active{background:rgba(200,164,94,.13);border-color:rgba(200,164,94,.27);color:var(--g)}
.tab:hover:not(.active){color:var(--tx)}

.view{display:none;animation:fadeIn .3s ease}
.view.active{display:flex;flex-direction:column;gap:10px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.grid{display:grid;gap:10px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g7{grid-template-columns:repeat(7,1fr)}
.g-auto{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
.g-auto-lg{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.g-auto-ch{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.g-cal{grid-template-columns:1fr 260px}

.card{background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:14px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--g);margin-bottom:10px}

/* KPI */
.kpi{background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:11px 13px}
.kpi-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.kpi-label{font-size:9px;color:var(--sb);text-transform:uppercase;letter-spacing:1.5px}
.kpi-icon{font-size:13px}
.kpi-value{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--g)}
.kpi-value.warn{color:var(--red)}
.kpi-value.green{color:var(--grn)}
.kpi-sub{font-size:10px;color:var(--sb);margin-top:1px}
.kpi-sub.warn{color:var(--red)}

/* Bars */
.bar-track{background:var(--bg);border-radius:3px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.stacked-bar{display:flex;height:20px;border-radius:5px;overflow:hidden;margin-bottom:10px}
.stacked-bar.tall{height:28px;border-radius:6px}
.stacked-seg{display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;font-weight:600;transition:width .5s}

/* Channel cards */
.ch-card{background:var(--cd);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.ch-card .top-line{position:absolute;top:0;left:0;right:0;height:3px}
.ch-card-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:10px}
.ch-card-name{font-size:14px;font-weight:600}
.ch-card-rev{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--g);font-weight:700}
.ch-card-pct{font-size:10px;color:var(--sb)}
.ch-card-badge{background:var(--bg);border-radius:8px;padding:6px 10px;text-align:center}
.ch-card-badge-num{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600}
.ch-card-badge-label{font-size:8px;color:var(--sb)}
.ch-card-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ch-card-stat-label{font-size:7px;color:var(--sb);text-transform:uppercase;letter-spacing:1px}
.ch-card-stat-val{font-size:11px;font-weight:500}

/* Alert */
.alert{border-radius:10px;padding:14px}
.alert-warn{background:rgba(232,93,58,.07);border:1px solid rgba(232,93,58,.2)}
.alert-title{font-size:12px;font-weight:600;color:var(--red);margin-bottom:4px}
.alert-text{font-size:11px;line-height:1.5}

/* Villa cards */
.villa-card{background:var(--cd);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.villa-card .top-line{position:absolute;top:0;left:0;right:0;height:3px}
.villa-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.villa-info{display:flex;align-items:center;gap:6px}
.villa-emoji{font-size:20px}
.villa-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600}
.villa-meta{font-size:8px;color:var(--sb)}
.villa-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.villa-stat-label{font-size:7px;color:var(--sb);text-transform:uppercase;letter-spacing:1px}
.villa-stat-val{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--g)}
.villa-stat-val.normal{color:var(--tx);font-weight:400}

/* Ring */
.ring-wrap{position:relative;display:inline-flex}
.ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cormorant Garamond',serif;font-weight:700}

/* Ranking */
.rank-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd)}
.rank-num{font-size:12px;font-weight:600;width:16px;text-align:center}
.rank-dot{width:6px;height:6px;border-radius:50%}
.rank-name{font-size:11px;flex:1}
.rank-val{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--g);font-weight:600;width:65px;text-align:right}
.rank-bar{width:120px;background:var(--bg);border-radius:2px;height:5px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:2px}
.rank-occ{font-size:9px;color:var(--sb);width:30px;text-align:right}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-btn{background:none;border:1px solid var(--bd);color:var(--g);padding:3px 9px;border-radius:5px;cursor:pointer;font-family:inherit;transition:all .2s}
.cal-btn:disabled{color:#222;cursor:default}
.cal-month{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--g)}
.cal-chart{background:var(--cd);border-radius:8px;padding:6px 10px;margin-bottom:8px;border:1px solid var(--bd)}
.cal-chart-label{font-size:8px;color:var(--sb);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.cal-bars{display:flex;align-items:flex-end;gap:1px;height:34px}
.cal-bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%;cursor:pointer}
.cal-bar-card{border-radius:1px 1px 0 0;transition:all .15s}
.cal-bar-cash{background:var(--grn);min-height:1px}
.cal-legend{display:flex;gap:8px;margin-top:3px;font-size:8px;color:var(--sb)}
.cal-grid-wrap{background:var(--cd);border-radius:8px;padding:8px;border:1px solid var(--bd)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:2px}
.cal-wd{text-align:center;font-size:8px;color:var(--sb);padding:1px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid var(--bd);cursor:pointer;transition:all .15s}
.cal-day:hover{border-color:rgba(200,164,94,.3)}
.cal-day.has-occ{background:rgba(200,164,94,.05)}
.cal-day.selected{background:rgba(200,164,94,.13);border:2px solid var(--g)}
.cal-day-num{font-size:11px;color:#333}
.cal-day.has-occ .cal-day-num{color:var(--tx)}
.cal-day.selected .cal-day-num{font-weight:600}
.cal-day-dots{display:flex;gap:1px;margin-top:1px}
.cal-dot{width:4px;height:4px;border-radius:50%}
.cal-colors{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;padding-top:4px;border-top:1px solid var(--bd)}
.cal-color{display:flex;align-items:center;gap:2px;font-size:7px;color:var(--sb)}
.cal-color-dot{width:5px;height:5px;border-radius:50%}

/* Side panel */
.side-panel{background:var(--cd);border-radius:8px;padding:10px;border:1px solid var(--bd);position:sticky;top:60px}
.side-title{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--g)}
.side-sub{font-size:9px;color:var(--sb);margin-bottom:6px}
.side-empty{text-align:center;padding:14px}
.side-empty-icon{font-size:20px}
.side-empty-text{font-size:9px;color:var(--sb);margin-top:2px}
.res-card{border-radius:6px;padding:7px;cursor:pointer;border:1px solid var(--bd);margin-bottom:4px;transition:all .15s;background:var(--bg)}
.res-card:hover,.res-card.open{background:rgba(200,164,94,.07);border-color:rgba(200,164,94,.2)}
.res-card-head{display:flex;justify-content:space-between}
.res-card-guest{font-size:10px;font-weight:500}
.res-card-room{display:flex;align-items:center;gap:2px;margin-top:2px}
.res-card-room-dot{width:4px;height:4px;border-radius:50%;display:inline-block}
.res-card-room-name{font-size:8px;color:var(--sb)}
.res-card-total{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--g);font-weight:600}
.res-card-detail{margin-top:4px;padding-top:4px;border-top:1px solid var(--bd);font-size:9px;display:grid;grid-template-columns:1fr 1fr;gap:2px;display:none}
.res-card.open .res-card-detail{display:grid}
.res-card-detail span.label{color:var(--sb)}
.side-footer{margin-top:5px;padding-top:5px;border-top:1px solid var(--bd);display:flex;justify-content:space-between}
.side-footer-label{font-size:8px;color:var(--sb)}
.side-footer-val{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--g);font-weight:600}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:10px}
th{padding:6px 8px;text-align:left;font-size:8px;color:var(--sb);text-transform:uppercase;letter-spacing:1.5px;font-weight:500;border-bottom:1px solid var(--bd)}
td{padding:5px 8px;border-bottom:1px solid var(--bd)}
tr:hover td{background:rgba(200,164,94,.04)}
.td-guest{font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-total{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--g);font-weight:600}
.td-paid{color:var(--grn);font-size:9px}
.td-pending{color:var(--red);font-size:9px}
.td-channel{font-size:9px;font-weight:500}
.td-sub{color:var(--sb);font-size:9px}
.td-room{display:inline-flex;align-items:center;gap:2px}
.td-room-dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.td-room-name{font-size:9px}

.footer{text-align:center;padding:12px 0 4px;font-size:8px;color:#222}

@media(max-width:800px){
  .g2,.g3,.g-cal{grid-template-columns:1fr}
  .g7{grid-template-columns:repeat(4,1fr)}
  .ch-card-stats{grid-template-columns:repeat(2,1fr)}
  .rank-bar{width:60px}
}
</style>
</head>

// === HELPERS ===
const fmt=n=>"$"+Math.round(n).toLocaleString("es-MX");
function pd(s){const[d,m,y]=s.split("-").map(Number);return new Date(y,m-1,d)}
function getCh(r){if(r.startsWith("EXP"))return{n:"Expedia",c:"#FBBF24"};if(r.startsWith("BDC"))return{n:"Booking.com",c:"#003580"};if(r.startsWith("ABB"))return{n:"Airbnb",c:"#FF385C"};if(r.startsWith("BBN"))return{n:"Beds24",c:"#10B981"};if(r.startsWith("LH"))return{n:"Directa",c:"#C8A45E"};return{n:"Otro",c:"#888"}}
function ring(pct,size=80,sw=7){const r=(size-sw)/2,c=2*Math.PI*r,o=c-(pct/100)*c,col=pct>=80?"#10B981":pct>=70?"#C8A45E":"#E85D3A";return`<svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1a1a1e" stroke-width="${sw}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${o}" stroke-linecap="round" style="transition:stroke-dashoffset .8s"/></svg>`}
function kpi(l,v,s,icon,warn,accent){return`<div class="kpi"><div class="kpi-head"><span class="kpi-label">${l}</span><span class="kpi-icon">${icon}</span></div><div class="kpi-value${warn?' warn':''}${accent?' green':''}">${v}</div><div class="kpi-sub${warn?' warn':''}">${s}</div></div>`}
function bar(pct,color){return`<div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>`}

function getFiltered(){return selRoom==="all"?CI:CI.filter(d=>d.rm===selRoom)}
function getStats(data){const r=data.reduce((s,d)=>s+d.t,0),n=data.reduce((s,d)=>s+d.n,0),p=data.reduce((s,d)=>s+Math.max(0,d.p),0);return{rev:r,nights:n,pending:p,avg:n?r/n:0,stay:data.length?n/data.length:0,cnt:data.length}}
function getOccMap(data){const map={};data.forEach(r=>{const s=pd(r.d);for(let i=0;i<r.n;i++){const d=new Date(s);d.setDate(d.getDate()+i);const k=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;if(!map[k])map[k]=[];map[k].push(r)}});return map}

const TABS=[["overview","📊 Overview"],["hotel","🏨 Hotel KPIs"],["channels","📡 Canales"],["calendar","📅 Calendario"],["payments","💳 Pagos"],["rooms","🏠 Villas"],["list","📋 Reservas"]];
function initTabs(){const el=document.getElementById("tabs");el.innerHTML=TABS.map(([v,l])=>`<button class="tab${v===curView?" active":""}" onclick="switchView('${v}')">${l}</button>`).join("")}
function switchView(v){curView=v;openRes=null;document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",TABS[i][0]===v));document.querySelectorAll(".view").forEach(el=>el.classList.remove("active"));document.getElementById("view"+v.charAt(0).toUpperCase()+v.slice(1)).classList.add("active");render()}

function doSearch(){const q=document.getElementById("searchInput").value.toLowerCase();const el=document.getElementById("searchResults");if(q.length<2){el.classList.remove("show");return}const res=CI.filter(d=>d.g.toLowerCase().includes(q)||d.r.toLowerCase().includes(q)).slice(0,8);if(!res.length){el.classList.remove("show");return}el.innerHTML=res.map(r=>`<div class="search-item" onclick="document.getElementById('searchInput').value='';document.getElementById('searchResults').classList.remove('show');switchView('list')"><div class="search-item-name">${r.g}</div><div class="search-item-meta">${r.rm} · ${r.d} · ${fmt(r.t)}</div></div>`).join("");el.classList.add("show")}

function render(){

  document.getElementById("viewOverview").innerHTML=`
    <div class="grid g-auto" style="gap:8px">${kpi("Ingreso Total",fmt(CH_TOT.rev),"habitaciones (LH oficial)","💰")}${kpi("+ Extras",fmt(REV.ext),"restaurante y servicios","🍽️")}${kpi("Cobrado",fmt(1388148),"173 transacciones","✅")}${kpi("Ocupación",H.occ+"%",H.oN+"/"+H.tN+" noches","🛏️")}${kpi("ADR",fmt(H.adr),"tarifa diaria promedio","📈")}${kpi("RevPAR",fmt(H.revpar),"por hab. disponible","🎯")}</div>
    <div class="grid g2">
      <div class="card"><div class="card-title">Ingresos Mensuales</div>${mStats.map(ms=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:11px">${ms.l}</span><span style="font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--g);font-weight:600">${fmt(ms.rev)}</span></div>${bar((ms.rev/mMax)*100,"linear-gradient(90deg,var(--g),var(--gl))")}<div style="font-size:8px;color:var(--sb);margin-top:1px">${ms.cnt} reservas · ${ms.nights} noches</div></div>`).join("")}</div>
      <div class="card"><div class="card-title">Canales (Oficial LH)</div><div class="stacked-bar">${CHANNELS.map(ch=>`<div class="stacked-seg" style="width:${(ch.rev/CH_TOT.rev)*100}%;background:${ch.c};color:${ch.n==="Booking.com"?"#fff":"#000"}">${(ch.rev/CH_TOT.rev)>0.1?((ch.rev/CH_TOT.rev)*100).toFixed(0)+"%":""}</div>`).join("")}</div>${CHANNELS.map(ch=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bd)"><div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:2px;background:${ch.c}"></div><span style="font-size:10px">${ch.n}</span></div><span style="font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--g);font-weight:600">${fmt(ch.rev)}</span></div>`).join("")}</div>
    </div>
    <div class="card"><div class="card-title">Desglose de Ingresos (c/ impuestos)</div>
      <div class="stacked-bar tall">${[{l:"Habitación 79.8%",v:REV.hab,c:"var(--g)",tc:"#000"},{l:"Impuestos 14.6%",v:REV.imp,c:"#5B9BD5",tc:"#fff"},{l:"Extras 5.6%",v:REV.ext,c:"#10B981",tc:"#fff"}].map(x=>`<div class="stacked-seg" style="width:${(x.v/(REV.hab+REV.ext+REV.imp))*100}%;background:${x.c};color:${x.tc};font-size:9px;font-weight:700">${x.l}</div>`).join("")}</div>
      <div class="grid g3" style="gap:8px">${[{l:"Habitación",v:REV.hab,c:"var(--g)",d:"Tarifa de hospedaje"},{l:"Impuestos",v:REV.imp,c:"#5B9BD5",d:"ISH + IVA"},{l:"Extras",v:REV.ext,c:"#10B981",d:"Restaurante y servicios"}].map(x=>`<div style="background:var(--bg);border-radius:8px;padding:10px;text-align:center"><div style="font-size:8px;color:var(--sb);text-transform:uppercase;letter-spacing:1px">${x.l}</div><div style="font-family:'Cormorant Garamond',serif;font-size:18px;color:${x.c};font-weight:600">${fmt(x.v)}</div><div style="font-size:9px;color:var(--sb)">${x.d}</div></div>`).join("")}</div>

function renderCalendar(f){
  const m=months[curMonth],occMap=getOccMap(f);
  const dim=new Date(m.y,m.m+1,0).getDate(),fd=new Date(m.y,m.m,1).getDay();
  const mStr=String(m.m+1).padStart(2,"0");
  const mDaily=DP.filter(d=>d.d.split("-")[1]===mStr);
  const maxD=Math.max(...mDaily.map(d=>d.t),1);

  let calDays="";
  for(let i=0;i<fd;i++)calDays+="<div></div>";
  for(let day=1;day<=dim;day++){
    const k=`${m.y}-${m.m}-${day}`,occ=occMap[k]||[];
    const isSel=selDate&&selDate.y===m.y&&selDate.m===m.m&&selDate.d===day;
    const dots=occ.slice(0,4).map(r=>`<div class="cal-dot" style="background:${RC[r.rm]||'#666'}"></div>`).join("");
    calDays+=`<div class="cal-day${occ.length?" has-occ":""}${isSel?" selected":""}" onclick="selectDay(${m.y},${m.m},${day})"><div class="cal-day-num">${day}</div>${occ.length?`<div class="cal-day-dots">${dots}</div>`:""}</div>`;
  }

  let sidePanel;
  if(selDate){
    const dayRes=occMap[`${selDate.y}-${selDate.m}-${selDate.d}`]||[];
    sidePanel=`<div class="side-panel"><div class="side-title">${selDate.d} de ${months[selDate.m]?.l||""}</div><div class="side-sub">${dayRes.length===0?"Sin ocupación":dayRes.length+"/7 villas"}</div>`;
    if(!dayRes.length)sidePanel+=`<div class="side-empty"><div class="side-empty-icon">🌙</div><div class="side-empty-text">Disponible</div></div>`;
    dayRes.forEach((res,i)=>{
      const ch=getCh(res.r),isOpen=openRes===res.r;
      sidePanel+=`<div class="res-card${isOpen?" open":""}" onclick="toggleRes('${res.r}')"><div class="res-card-head"><div><div class="res-card-guest">${res.g}</div><div class="res-card-room"><span class="res-card-room-dot" style="background:${RC[res.rm]}"></span><span class="res-card-room-name">${res.rm}</span></div></div><div style="text-align:right"><div class="res-card-total">${fmt(res.t)}</div></div></div><div class="res-card-detail"><div><span class="label">Canal:</span> <span style="color:${ch.c}">${ch.n}</span></div><div><span class="label">$/n:</span> ${fmt(res.t/Math.max(res.n,1))}</div><div style="grid-column:1/-1"><span class="label">Pago:</span> <span style="color:${res.p>1?"var(--red)":"var(--grn)"}">${res.p>1?fmt(res.p)+" pend.":"Pagado ✓"}</span></div></div></div>`;
    });
    if(dayRes.length)sidePanel+=`<div class="side-footer"><span class="side-footer-label">Ingreso/día</span><span class="side-footer-val">${fmt(dayRes.reduce((s,r)=>s+r.t/Math.max(r.n,1),0))}</span></div>`;
    sidePanel+=`</div>`;
  }else{
    sidePanel=`<div class="side-panel" style="text-align:center;padding:16px"><div style="font-size:22px">🌙</div><div style="font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--g);margin-top:4px">Selecciona un día</div></div>`;
  }

  document.getElementById("viewCalendar").innerHTML=`<div class="grid g-cal">
    <div>
      <div class="cal-nav"><button class="cal-btn" ${curMonth===0?"disabled":""} onclick="navMonth(-1)">←</button><div class="cal-month">${m.l} 2026</div><button class="cal-btn" ${curMonth===2?"disabled":""} onclick="navMonth(1)">→</button></div>
      <div class="cal-chart"><div class="cal-chart-label">Cobros — ${m.l}</div><div class="cal-bars">${mDaily.map(d=>{const dayN=parseInt(d.d);const isSel=selDate&&selDate.d===dayN&&selDate.m===m.m;return`<div class="cal-bar" onclick="selectDay(${m.y},${m.m},${dayN})"><div class="cal-bar-card" style="height:${Math.max((d.c/maxD)*100,d.c>0?3:0)}%;background:${isSel?"var(--gl)":"rgba(200,164,94,.47)"}"></div>${d.e>0?`<div class="cal-bar-cash" style="height:${(d.e/maxD)*100}%"></div>`:""}</div>`}).join("")}</div><div class="cal-legend"><span>🟡 Tarjeta</span><span>🟢 Efectivo</span></div></div>
      <div class="cal-grid-wrap"><div class="cal-weekdays">${["Do","Lu","Ma","Mi","Ju","Vi","Sa"].map(d=>`<div class="cal-wd">${d}</div>`).join("")}</div><div class="cal-days">${calDays}</div><div class="cal-colors">${VILLAS.map(v=>`<div class="cal-color"><div class="cal-color-dot" style="background:${v.c}"></div>${v.n.replace("Villa ","")}</div>`).join("")}</div></div>
    </div>
    <div>${sidePanel}</div>
  </div>`;
}

      </div>

function renderList(f){
  const sorted=[...f].sort((a,b)=>pd(a.d)-pd(b.d));
  document.getElementById("viewList").innerHTML=`<div class="card" style="padding:0"><div class="table-wrap"><table><thead><tr>${["Fecha","Huésped","Villa","Noches","Canal","Total","Pendiente","$/Noche"].map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${sorted.map(res=>{const ch=getCh(res.r);return`<tr><td class="td-sub" style="white-space:nowrap">${res.d}</td><td class="td-guest">${res.g}</td><td><span class="td-room"><span class="td-room-dot" style="background:${RC[res.rm]}"></span><span class="td-room-name">${res.rm.replace("Villa ","")}</span></span></td><td style="text-align:center">${res.n}</td><td><span class="td-channel" style="color:${ch.c}">${ch.n}</span></td><td class="td-total">${fmt(res.t)}</td><td class="${res.p>1?"td-pending":"td-paid"}">${res.p>1?fmt(res.p):"✓"}</td><td class="td-sub">${fmt(res.t/Math.max(res.n,1))}</td></tr>`}).join("")}</tbody></table></div></div>`;

// === INTERACTIONS ===
function selectDay(y,m,d){selDate={y,m,d};openRes=null;render()}
function navMonth(dir){curMonth=Math.max(0,Math.min(2,curMonth+dir));selDate=null;render()}
function toggleRes(r){openRes=openRes===r?null:r;render()}

// === INIT ===
initTabs();initVillaSelect();render();
</script>

function svgD(data,sz=120,lb=""){
  const tot=data.reduce(function(s,d){return s+d.v},0);
  var cum=0;const r=sz/2-10,cx=sz/2,cy=sz/2,C=2*Math.PI*r;
  var paths='';
  data.forEach(function(d){
    var pc=d.v/tot,ds=C*pc,gp=C-ds,offset=-C*cum+C*0.25;
    paths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+d.c+'" stroke-width="16" stroke-dasharray="'+ds+' '+gp+'" stroke-dashoffset="'+offset+'" opacity=".85"/>';
    cum+=pc;
  });
  return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'">'+paths+'<text x="'+cx+'" y="'+(cy+2)+'" text-anchor="middle" fill="var(--g)" font-family="Cormorant Garamond,serif" font-size="20" font-weight="700">'+lb+'</text></svg>';
}

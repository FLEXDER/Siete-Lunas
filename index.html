<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Boutique Siete Lunas — Dashboard Q1 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#111;--card2:#161616;--gold:#c8a45e;--gold2:#e8c96e;--text:#e8e8e8;--text2:#999;--text3:#666;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#a78bfa;--border:#222}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:24px}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;letter-spacing:6px;color:var(--gold)}
.login-sub{color:var(--text2);font-size:14px;letter-spacing:2px}
.pin-dots{display:flex;gap:12px;margin:20px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--gold);background:transparent;transition:.2s}
.pin-dot.filled{background:var(--gold)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px}
.pin-btn{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:20px;padding:16px;border-radius:12px;cursor:pointer;transition:.15s;font-family:'Outfit'}
.pin-btn:hover{background:var(--card2);border-color:var(--gold)}
.pin-btn.del{font-size:14px;color:var(--text2)}
.pin-error{color:var(--red);font-size:13px;min-height:20px}
.pin-user{color:var(--gold);font-size:15px;min-height:22px;letter-spacing:1px}

.dashboard{display:none}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:3px;color:var(--gold)}
.topbar-sep{color:var(--text3);font-weight:200}
.topbar-period{color:var(--text2);font-size:13px;letter-spacing:1px}
.topbar-user{display:flex;align-items:center;gap:10px;color:var(--text2);font-size:13px}
.topbar-user span{color:var(--gold)}
.btn-logout{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Outfit';transition:.15s}
.btn-logout:hover{border-color:var(--gold);color:var(--gold)}

.tabs{display:flex;gap:4px;padding:12px 28px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg);position:sticky;top:57px;z-index:99}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:.15s;white-space:nowrap;letter-spacing:.5px}
.tab:hover{color:var(--text);background:var(--card)}
.tab.active{background:linear-gradient(135deg,var(--gold),#a08040);color:#000;font-weight:500}

.content{padding:24px 28px;max-width:1400px;margin:0 auto}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.g7{grid-template-columns:repeat(7,1fr)}
@media(max-width:900px){.g2,.g3,.g4,.g7{grid-template-columns:1fr}}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--text2);margin-bottom:12px}
.card-value{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--gold)}
.card-value.sm{font-size:24px}
.card-sub{font-size:12px;color:var(--text3);margin-top:4px}

.section-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--text);margin:28px 0 16px;letter-spacing:1px}
.section-title:first-child{margin-top:0}

.bar-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.bar-row:last-child{border:none}
.bar-label{width:120px;font-size:13px;color:var(--text2);flex-shrink:0}
.bar-track{flex:1;height:28px;background:var(--card2);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-size:12px;font-weight:500;color:#000;transition:.6s;min-width:fit-content}
.bar-val{font-size:13px;color:var(--text);width:100px;text-align:right;flex-shrink:0}

table.dt{width:100%;border-collapse:collapse;font-size:13px}
table.dt th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:500}
table.dt td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
table.dt tr:hover td{background:var(--card2)}
.status-pending{color:var(--red)}
.status-paid{color:var(--green)}

.search-box{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:10px;width:100%;max-width:400px;font-family:'Outfit';font-size:14px;margin-bottom:16px}
.search-box:focus{outline:none;border-color:var(--gold)}
.search-box::placeholder{color:var(--text3)}

.occ-ring{position:relative;width:140px;height:140px;margin:0 auto 12px}
.occ-ring svg{transform:rotate(-90deg)}
.occ-ring-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.occ-ring-pct{font-family:'Cormorant Garamond',serif;font-size:36px;color:var(--gold);font-weight:300}
.occ-ring-sub{font-size:10px;color:var(--text3);letter-spacing:1px}

.villa-card{text-align:center;padding:16px}
.villa-name{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text);margin-bottom:8px}
.villa-occ{font-size:28px;font-weight:300;color:var(--gold);font-family:'Cormorant Garamond',serif}
.villa-stat{font-size:11px;color:var(--text2);margin-top:4px}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.footer{text-align:center;padding:32px;color:var(--text3);font-size:11px;letter-spacing:2px;border-top:1px solid var(--border);margin-top:40px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-exp{background:#1e3a5f;color:#60a5fa}
.tag-db{background:#1a3d1a;color:#4ade80}
.tag-ext{background:#3d2e1a;color:#e8c96e}
.tag-abb{background:#3d1a2e;color:#f472b6}
.tag-bkn{background:#1a2d3d;color:#67e8f9}
.tag-oth{background:#2d2d2d;color:#999}

.pane{display:none}
.pane.active{display:block}

.month-toggle{display:flex;gap:4px;margin-bottom:16px}
.month-btn{padding:6px 16px;border-radius:6px;font-size:12px;background:var(--card);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:'Outfit';transition:.15s}
.month-btn:hover{border-color:var(--gold)}
.month-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:500}
.highlight{color:var(--gold)}
.profile-card{display:flex;align-items:center;gap:16px;padding:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:.2s;font-size:18px;color:var(--text);font-family:'Cormorant Garamond',serif;letter-spacing:1px}
.profile-card:hover{border-color:var(--gold);background:var(--card2)}
.profile-avatar{width:44px;height:44px;border-radius:50%;background:var(--card2);border:1.5px solid var(--text3);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);font-weight:600;flex-shrink:0}
</style>
</head>

// === LOGIN ===
function initLogin(){
  const dots=document.getElementById("pinDots");
  dots.innerHTML=[0,1,2,3].map(()=>'<div class="pin-dot"></div>').join('');
  const pad=document.getElementById("pinPad");
  pad.innerHTML=[1,2,3,4,5,6,7,8,9,'',0,'←'].map(n=>
    n===''?'<div></div>':
    n==='←'?`<button class="pin-btn del" onclick="pinDel()">${n}</button>`:
    `<button class="pin-btn" onclick="pinAdd(${n})">${n}</button>`
  ).join('');
}

function pinAdd(n){
  if(pin.length>=4)return;
  pin+=n;
  updateDots();
  if(pin.length===4){
    if(pin===selectedPin){
      currentUser={name:selectedName,role:selectedName==="Admin"?"admin":"owner"};
      document.getElementById("loginScreen").style.display="none";
      document.getElementById("dashboard").style.display="block";
      document.getElementById("userName").textContent=currentUser.name;
      initDashboard();
    } else {
      document.getElementById("pinError").textContent="PIN incorrecto";
      setTimeout(()=>{pin="";updateDots();document.getElementById("pinError").textContent=""},800);
    }
  }
}
function pinDel(){pin=pin.slice(0,-1);updateDots();document.getElementById("pinError").textContent="";}
function updateDots(){document.querySelectorAll(".pin-dot").forEach((d,i)=>d.classList.toggle("filled",i<pin.length));}
function logout(){document.getElementById("dashboard").style.display="none";document.getElementById("loginScreen").style.display="flex";document.getElementById("profileSelect").style.display="flex";document.getElementById("pinSection").style.display="none";pin="";currentUser=null;selectedPin="";selectedName="";updateDots();}

// === DASHBOARD ===
function initDashboard(){
  const tabsEl=document.getElementById("tabs");
  tabsEl.innerHTML=TABS.map((t,i)=>`<div class="tab${i===0?' active':''}" onclick="switchTab(${i})">${t}</div>`).join('');
  renderTab(0);
}

function switchTab(i){
  currentTab=i;
  document.querySelectorAll(".tab").forEach((t,j)=>t.classList.toggle("active",j===i));
  renderTab(i);
}

function renderTab(i){
  const c=document.getElementById("content");
  if(i===0) renderOverview(c);
  else if(i===1) renderKPIs(c);
  else if(i===2) renderChannels(c);
  else if(i===3) renderVillas(c);
  else if(i===4) renderPayments(c);
  else if(i===5) renderReservations(c);
}

let searchTerm="";
function renderReservations(c){
  const filtered=RESERVATIONS.filter(r=>{
    if(!searchTerm)return true;
    const s=searchTerm.toLowerCase();
    return r.g.toLowerCase().includes(s)||r.r.toLowerCase().includes(s)||r.rm.toLowerCase().includes(s)||r.ch.toLowerCase().includes(s);
  });
  
  c.innerHTML=`
    <div class="section-title">Reservaciones — Q1 2026</div>
    <input class="search-box" placeholder="Buscar huésped, reserva, villa o canal..." value="${searchTerm}" oninput="searchTerm=this.value;renderReservations(document.getElementById('content'))">
    <div style="margin-bottom:12px;color:var(--text2);font-size:13px">${filtered.length} reservaciones encontradas</div>
    <div style="overflow-x:auto">
    <table class="dt">
      <thead><tr><th>Huésped</th><th>Check-in</th><th>Noches</th><th>Villa</th><th>Canal</th><th>Total</th><th>Pendiente</th></tr></thead>
      <tbody>${filtered.map(r=>{
        const tagClass=r.ch==="Expedia"?"tag-exp":r.ch==="Booking.com"?"tag-bkn":r.ch==="Airbnb"?"tag-abb":r.ch==="Direct/Extranet"?"tag-ext":"tag-oth";
        return `<tr>
          <td>${r.g}</td>
          <td>${r.d}</td>
          <td>${r.n}</td>
          <td>${r.rm}</td>
          <td><span class="tag ${tagClass}">${r.ch}</span></td>
          <td>${fmt(r.t)}</td>
          <td class="${r.p>0?'status-pending':'status-paid'}">${r.p>0?fmtd(r.p):'✓'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>
    </div>
    <div class="footer">${filtered.length} reservaciones · Hotel Boutique Siete Lunas · Powered by Flexder Corporativo</div>
  `;
}
